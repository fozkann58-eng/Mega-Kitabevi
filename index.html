.header-sub {

}

.info {

}

.btn {

}

.disabled {

}

.description {

const derslerDiv = document.getElementById('dersler');
const siniflarDiv = document.getElementById('siniflar');
const urunlerDiv = document.getElementById('urunler');

let selectedDers = '';
let selectedSinif = 'Tümü';

const dersler = dersOrder.filter(d =>
    data.some(x => x.ders === d)
);

dersler.forEach(ders => {

    const btn = document.createElement('div');
    btn.className = 'filter-btn';
    btn.textContent = ders;

    btn.onclick = () => {

        document.querySelectorAll('#dersler .filter-btn')
            .forEach(x => x.classList.remove('active'));

        btn.classList.add('active');

        selectedDers = ders;
        selectedSinif = 'Tümü';

        renderSiniflar();
        renderUrunler();
    }

    derslerDiv.appendChild(btn);
});

function renderSiniflar() {

    siniflarDiv.innerHTML = '';

    const siniflar = [...new Set(
        data.filter(x => x.ders === selectedDers)
            .map(x => x.sinif)
            .filter(Boolean)
    )].sort();

    const tumuBtn = document.createElement('div');
    tumuBtn.className = 'filter-btn active';
    tumuBtn.textContent = 'Tümü';

    tumuBtn.onclick = () => {

        document.querySelectorAll('#siniflar .filter-btn')
            .forEach(x => x.classList.remove('active'));

        tumuBtn.classList.add('active');

        selectedSinif = 'Tümü';
        renderUrunler();
    }

    siniflarDiv.appendChild(tumuBtn);

    siniflar.forEach(sinif => {

        const btn = document.createElement('div');
        btn.className = 'filter-btn';
        btn.textContent = sinif;

        btn.onclick = () => {

            document.querySelectorAll('#siniflar .filter-btn')
                .forEach(x => x.classList.remove('active'));

            btn.classList.add('active');

            selectedSinif = sinif;
            renderUrunler();
        }

        siniflarDiv.appendChild(btn);
    });
}

function renderUrunler() {

    let filtered = data.filter(x => x.ders === selectedDers);

    if(selectedSinif !== 'Tümü') {
        filtered = filtered.filter(x => x.sinif === selectedSinif);
    }

    urunlerDiv.innerHTML = '';

    filtered.forEach(item => {

        const disabled = item.link.includes('Henüz');

        const card = document.createElement('div');
        card.className = 'card';

        card.innerHTML = `
            <div class="badge">${item.yayin}</div>

            <div class="product-title">${item.urun}</div>

            <div class="info">${item.sinif}</div>

            ${disabled
                ? '<span class="btn disabled">Henüz Yayınlanmadı</span>'
                : `<a class="btn" href="${item.link}" target="_blank">Ürünü İncele</a>`
            }

            <div class="description">
                ${item.aciklama || 'Açıklama bulunmuyor.'}
            </div>
        `;

        urunlerDiv.appendChild(card);
    });
}

window.onload = () => {
    const first = document.querySelector('#dersler .filter-btn');

    if(first) first.click();
}

</script>

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');

</script>
